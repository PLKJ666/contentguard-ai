# ═══════════════════════════════════════════
# 内容卫士 AI 审核平台 — 生产环境 Docker Compose
# 使用私有仓库预构建镜像，不在生产环境构建
# ═══════════════════════════════════════════

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-backend-env: &backend-env
  # 生产环境统一走外部数据库/Redis 连接串，由根目录 .env 提供。
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-contentguard}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-contentguard}}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  LOCAL_FILE_STORAGE_ENABLED: "true"
  LOCAL_FILE_STORAGE_PREFER_UPLOAD: "true"
  LOCAL_FILE_STORAGE_DIR: /app/local_uploads

services:
  postgres:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/library/postgres:16-alpine
    container_name: contentguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-contentguard}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-3654}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/library/redis:7-alpine
    container_name: contentguard-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI 后端 ───
  backend:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/contentguard-backend:${IMAGE_TAG:-latest}
    container_name: contentguard-backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-env
    volumes:
      - video_temp:/tmp/videos
      - local_uploads:/app/local_uploads
    healthcheck:
      # Health endpoints are mounted under /api/v1.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ─── Celery Worker (异步任务) ───
  celery-worker:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/contentguard-backend:${IMAGE_TAG:-latest}
    container_name: contentguard-celery-worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-env
    volumes:
      - video_temp:/tmp/videos
      - local_uploads:/app/local_uploads
    entrypoint: []
    command: celery -A app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2} -Q default,review
    # Worker doesn't expose HTTP; avoid inheriting image healthchecks that can mark it unhealthy.
    healthcheck:
      disable: true

  celery-xhs-worker:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/contentguard-backend:${IMAGE_TAG:-latest}
    container_name: contentguard-celery-xhs-worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-env
      XHS_BATCH_PARALLELISM: ${XHS_BATCH_PARALLELISM:-4}
    volumes:
      - video_temp:/tmp/videos
      - local_uploads:/app/local_uploads
    entrypoint: []
    command: celery -A app.celery_app worker --loglevel=info --concurrency=${XHS_BATCH_WORKER_CONCURRENCY:-4} -Q xhs_batch
    # Worker doesn't expose HTTP; avoid inheriting image healthchecks that can mark it unhealthy.
    healthcheck:
      disable: true

  # ─── Celery Beat (定时任务调度) ───
  celery-beat:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/contentguard-backend:${IMAGE_TAG:-latest}
    container_name: contentguard-celery-beat
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-env
    entrypoint: []
    command: celery -A app.celery_app beat --loglevel=info
    # Beat doesn't expose HTTP; avoid inheriting image healthchecks that can mark it unhealthy.
    healthcheck:
      disable: true

  # ─── Next.js 前端 ───
  frontend:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/contentguard-frontend:${IMAGE_TAG:-latest}
    container_name: contentguard-frontend
    # 前端客户端配置主要由 CI 构建时注入镜像。
    # 但 Route Handler / rewrites 仍需在运行时拿到内部后端地址和公开域名。
    environment:
      API_REWRITE_TARGET: ${API_REWRITE_TARGET:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    expose:
      - "3000"
    # Force IPv4 loopback: some images resolve localhost to ::1 first and fail to connect.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ─── Nginx 反向代理 ───
  nginx:
    <<: *common
    image: ${DOCKER_REGISTRY:-registry.example.com}/library/nginx:alpine
    container_name: contentguard-nginx
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  video_temp:
  local_uploads:
