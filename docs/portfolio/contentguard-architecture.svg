  <text x="497" y="239" fill="#101828" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700">Next.js 前端</text>
  <text x="497" y="269" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">App Router · 权限视图</text>
  <text x="497" y="296" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">SSE 进度订阅</text>

