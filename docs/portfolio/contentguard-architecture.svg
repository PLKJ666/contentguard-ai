  <text x="590" y="565" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">SQLAlchemy 2.0</text>
  <text x="590" y="591" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">Alembic migrations</text>

  <rect x="800" y="478" width="250" height="150" rx="18" fill="#ffffff" stroke="#d9dce5" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="860" cy="538" r="25" fill="#e7f8f0"/>
  <path d="M848 538h24M860 526v24" stroke="#0f9f6e" stroke-width="4" stroke-linecap="round"/>
