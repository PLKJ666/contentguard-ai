  <text x="900" y="565" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">异步媒体处理</text>
  <text x="900" y="591" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">审核队列与重试</text>

  <rect x="1110" y="478" width="218" height="150" rx="18" fill="#ffffff" stroke="#d9dce5" stroke-width="2" filter="url(#shadow)"/>
  <text x="1145" y="530" fill="#101828" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">文件存储</text>
  <text x="1145" y="560" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">TOS 或本地回退</text>
  <text x="1145" y="588" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">视频、脚本、导出文件</text>

