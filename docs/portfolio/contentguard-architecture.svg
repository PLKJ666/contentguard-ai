  <path d="M674 260H762" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow-accent)"/>
  <path d="M1092 236H1148" stroke="#596273" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M900 366V440H615V478" fill="none" stroke="#596273" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M927 366V440H925V478" fill="none" stroke="#596273" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1044 366V430H1218V478" fill="none" stroke="#596273" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M762 316H710V410H535V260H674" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrow-accent)"/>
  <text x="420" y="402" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">实时进度回传</text>

  <rect x="72" y="690" width="1256" height="1" fill="#d9dce5"/>
  <text x="72" y="722" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">当前实现：单体 FastAPI 后端 + Next.js 前端 + Celery/Redis 异步任务 + SSE 进度通知</text>
