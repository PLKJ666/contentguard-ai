<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">ContentGuard AI 技术架构</title>
  <desc id="desc">浏览器、Next.js、FastAPI、PostgreSQL、Redis、Celery、对象存储和兼容 OpenAI API 服务之间的数据流。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#596273"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity=".09"/>
    </filter>
  </defs>

  <rect width="1400" height="760" rx="24" fill="#f7f8fb"/>
  <text x="72" y="82" fill="#101828" font-family="Arial, Microsoft YaHei, sans-serif" font-size="30" font-weight="700">ContentGuard AI 技术架构</text>
  <text x="72" y="119" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">围绕内容交付流程组织的单体 API、异步媒体处理与实时进度反馈</text>

  <rect x="72" y="185" width="230" height="150" rx="18" fill="#ffffff" stroke="#d9dce5" stroke-width="2" filter="url(#shadow)"/>
