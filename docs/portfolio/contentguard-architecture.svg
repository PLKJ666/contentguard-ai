  <text x="175" y="272" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">角色化工作台</text>
  <text x="175" y="296" fill="#667085" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">上传、审核、反馈</text>

  <rect x="384" y="185" width="290" height="150" rx="18" fill="#ffffff" stroke="#cfd2ff" stroke-width="2" filter="url(#shadow)"/>
